name: Insightly CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: Insightly

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src/ --output-format=github --ignore E501

      - name: Test with pytest
        run: python -m pytest tests/ -q --tb=short

      - name: Validate sample data loads
        run: |
          python -c "
          import pandas as pd
          # CSV
          df = pd.read_csv('sample_data/personal_finance.csv')
          print(f'✅ CSV loaded: {len(df)} rows, {len(df.columns)} cols')
          # JSON
          df = pd.read_json('sample_data/survey_results.json')
          print(f'✅ JSON loaded: {len(df)} rows, {len(df.columns)} cols')
          # Excel
          df = pd.read_excel('sample_data/sales_report.xlsx')
          print(f'✅ Excel loaded: {len(df)} rows, {len(df.columns)} cols')
          "

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Insightly
    steps:
      - uses: actions/checkout@v4
      - name: Verify documentation files exist
        run: |
          for f in docs/getting_started.md docs/architecture.md docs/development.md docs/usage.md; do
            if [ -f "$f" ]; then
              echo "✅ $f exists"
            else
              echo "❌ $f missing"
              exit 1
            fi
          done
